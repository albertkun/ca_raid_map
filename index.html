<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>California ICE Raids Map - MapLibre</title>
    <script src='https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css' rel='stylesheet' />
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }
        .maplibregl-popup-content {
            padding: 10px;
            max-width: 300px;
        }
        .maplibregl-popup-content table {
            width: 100%;
            border-collapse: collapse;
        }
        .maplibregl-popup-content td {
            padding: 4px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        .maplibregl-popup-content td:first-child {
            font-weight: bold;
            padding-right: 10px;
        }
        #toggle-container {
            position: absolute;
            top: 10px;
            right: 10px;
            background: white;
            padding: 12px 16px;
            border-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
            font-family: Arial, sans-serif;
            font-size: 14px;
            z-index: 1;
        }
        #toggle-container label {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        #toggle-container input {
            margin-right: 8px;
            cursor: pointer;
        }
        #legend {
            position: absolute;
            bottom: 30px;
            right: 10px;
            background: white;
            padding: 12px;
            border-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
            font-family: Arial, sans-serif;
            font-size: 12px;
            z-index: 1;
        }
        #legend h4 {
            margin: 0 0 8px 0;
            font-size: 14px;
        }
        .legend-scale {
            display: flex;
            height: 20px;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 5px;
        }
        .legend-scale div {
            flex: 1;
        }
        .legend-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #666;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="toggle-container">
        <label>
            <input type="checkbox" id="heatmap-toggle" checked>
            Show Heatmap
        </label>
    </div>
    <div id="legend">
        <h4>ICE Raid Density</h4>
        <div class="legend-scale">
            <div style="background: rgba(255, 182, 193, 0.3);"></div>
            <div style="background: rgba(255, 105, 180, 0.5);"></div>
            <div style="background: rgba(255, 20, 147, 0.7);"></div>
            <div style="background: rgba(220, 20, 60, 0.85);"></div>
            <div style="background: rgb(178, 34, 34);"></div>
        </div>
        <div class="legend-labels">
            <span>Low</span>
            <span>High</span>
        </div>
    </div>
    <script>
        // Initialize the map
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
                sources: {
                    'carto-light': {
                        type: 'raster',
                        tiles: ['https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png'],
                        tileSize: 256,
                        attribution: '&copy; OpenStreetMap contributors, &copy; CARTO'
                    }
                },
                layers: [
                    {
                        id: 'carto-tiles',
                        type: 'raster',
                        source: 'carto-light',
                        minzoom: 0,
                        maxzoom: 22
                    }
                ]
            },
            center: [-120.57, 37.27], // Center of California bounds
            zoom: 6
        });

        // Add navigation controls
        map.addControl(new maplibregl.NavigationControl(), 'top-left');
        map.addControl(new maplibregl.ScaleControl(), 'bottom-left');

        // Wait for map to load
        map.on('load', function() {
            // Add county boundaries
            map.addSource('counties', {
                type: 'geojson',
                data: 'data/County_0.geojson'
            });

            map.addLayer({
                id: 'county-borders',
                type: 'line',
                source: 'counties',
                paint: {
                    'line-color': '#ccc',
                    'line-width': 0.5,
                    'line-opacity': 0.4
                }
            });

            // Add ICE raids data
            map.addSource('ice-raids', {
                type: 'geojson',
                data: 'data/ICERaid_1.geojson'
            });

            // Heatmap layer
            map.addLayer({
                id: 'raid-heatmap',
                type: 'heatmap',
                source: 'ice-raids',
                paint: {
                    'heatmap-weight': 1,
                    'heatmap-intensity': [
                        'interpolate',
                        ['linear'],
                        ['zoom'],
                        0, 0.5,
                        9, 1
                    ],
                    'heatmap-color': [
                        'interpolate',
                        ['linear'],
                        ['heatmap-density'],
                        0, 'rgba(255, 182, 193, 0)',
                        0.2, 'rgba(255, 182, 193, 0.3)',
                        0.4, 'rgba(255, 105, 180, 0.5)',
                        0.6, 'rgba(255, 20, 147, 0.7)',
                        0.8, 'rgba(220, 20, 60, 0.85)',
                        1, 'rgb(178, 34, 34)'
                    ],
                    'heatmap-radius': [
                        'interpolate',
                        ['linear'],
                        ['zoom'],
                        0, 2,
                        5, 10,
                        9, 20,
                        12, 30
                    ],
                    'heatmap-opacity': 0.8
                }
            });

            // Add popup on click
            map.on('click', 'raid-heatmap', function(e) {
                const coordinates = e.features[0].geometry.coordinates.slice();
                const props = e.features[0].properties;

                let html = '<table>';
                if (props.description) {
                    html += `<tr><td colspan="2"><strong>Description:</strong><br>${props.description}</td></tr>`;
                }
                if (props.comments) {
                    html += `<tr><td colspan="2"><strong>Comments:</strong><br>${props.comments}</td></tr>`;
                }
                if (props.timestamp) {
                    html += `<tr><td>Timestamp:</td><td>${props.timestamp}</td></tr>`;
                }
                if (props.location_url) {
                    html += `<tr><td>Location:</td><td><a href="${props.location_url}" target="_blank">View</a></td></tr>`;
                }
                if (props.media_url) {
                    html += `<tr><td>Media:</td><td><a href="${props.media_url}" target="_blank">View</a></td></tr>`;
                }
                html += '</table>';

                // Ensure popup appears on the correct position
                while (Math.abs(e.lngLat.lng - coordinates[0]) > 180) {
                    coordinates[0] += e.lngLat.lng > coordinates[0] ? 360 : -360;
                }

                new maplibregl.Popup()
                    .setLngLat(coordinates)
                    .setHTML(html)
                    .addTo(map);
            });

            // Change cursor on hover
            map.on('mouseenter', 'raid-heatmap', function() {
                map.getCanvas().style.cursor = 'pointer';
            });
            map.on('mouseleave', 'raid-heatmap', function() {
                map.getCanvas().style.cursor = '';
            });

            // Add circle points layer (hidden by default)
            map.addLayer({
                id: 'raid-points',
                type: 'circle',
                source: 'ice-raids',
                paint: {
                    'circle-color': '#dc143c',
                    'circle-radius': 5,
                    'circle-stroke-width': 1,
                    'circle-stroke-color': '#fff',
                    'circle-opacity': 0.7
                },
                layout: {
                    'visibility': 'none'
                }
            });

            // Add click and hover for points layer too
            map.on('click', 'raid-points', function(e) {
                const coordinates = e.features[0].geometry.coordinates.slice();
                const props = e.features[0].properties;

                let html = '<table>';
                if (props.description) {
                    html += `<tr><td colspan="2"><strong>Description:</strong><br>${props.description}</td></tr>`;
                }
                if (props.comments) {
                    html += `<tr><td colspan="2"><strong>Comments:</strong><br>${props.comments}</td></tr>`;
                }
                if (props.timestamp) {
                    html += `<tr><td>Timestamp:</td><td>${props.timestamp}</td></tr>`;
                }
                if (props.location_url) {
                    html += `<tr><td>Location:</td><td><a href="${props.location_url}" target="_blank">View</a></td></tr>`;
                }
                if (props.media_url) {
                    html += `<tr><td>Media:</td><td><a href="${props.media_url}" target="_blank">View</a></td></tr>`;
                }
                html += '</table>';

                while (Math.abs(e.lngLat.lng - coordinates[0]) > 180) {
                    coordinates[0] += e.lngLat.lng > coordinates[0] ? 360 : -360;
                }

                new maplibregl.Popup()
                    .setLngLat(coordinates)
                    .setHTML(html)
                    .addTo(map);
            });

            map.on('mouseenter', 'raid-points', function() {
                map.getCanvas().style.cursor = 'pointer';
            });
            map.on('mouseleave', 'raid-points', function() {
                map.getCanvas().style.cursor = '';
            });

            // Toggle functionality
            document.getElementById('heatmap-toggle').addEventListener('change', function(e) {
                const visibility = e.target.checked ? 'visible' : 'none';
                const pointsVisibility = e.target.checked ? 'none' : 'visible';
                map.setLayoutProperty('raid-heatmap', 'visibility', visibility);
                map.setLayoutProperty('raid-points', 'visibility', pointsVisibility);
            });

            // Fit bounds to California
            const bounds = new maplibregl.LngLatBounds(
                [-124.48, 32.53], // Southwest coordinates
                [-114.13, 42.01]  // Northeast coordinates
            );
            map.fitBounds(bounds, { padding: 20 });
        });
    </script>
</body>
</html>
